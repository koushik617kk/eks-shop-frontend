name: CI - Build and Push to ECR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPO: shop-frontend

jobs:
  build-and-push:
    name: Build Docker Image and Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO:latest
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          echo "ecr_registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Update Helm repo via GitHub REST API (no git push, no credential issues) ──
      # gh api directly calls GitHub HTTPS API using GH_TOKEN — bypasses git protocol entirely
      - name: Update values.yaml in Helm repo via GitHub API
        env:
          GH_TOKEN: ${{ secrets.HELM_REPO_PAT }}
          ECR_REGISTRY: ${{ steps.build.outputs.ecr_registry }}
          IMAGE_TAG: ${{ steps.build.outputs.image_tag }}
          GH_USER: ${{ secrets.GH_USERNAME }}
          HELM_REPO: eks-shop-helm
          VALUES_FILE: shop-frontend/values.yaml
        run: |
          # 1. Fetch the current file content and its SHA (required for the PUT update)
          RESPONSE=$(gh api repos/$GH_USER/$HELM_REPO/contents/$VALUES_FILE)
          FILE_SHA=$(echo "$RESPONSE" | jq -r '.sha')
          CURRENT_CONTENT=$(echo "$RESPONSE" | jq -r '.content' | base64 -d)

          # 2. Update image repository and tag in the content
          NEW_CONTENT=$(echo "$CURRENT_CONTENT" \
            | sed "s|repository: .*|repository: \"$ECR_REGISTRY/shop-frontend\"|" \
            | sed "s|tag: .*|tag: \"$IMAGE_TAG\"|")

          # 3. Encode updated content as base64
          ENCODED=$(echo "$NEW_CONTENT" | base64 -w0)

          # 4. Push the update directly via GitHub Contents API
          gh api repos/$GH_USER/$HELM_REPO/contents/$VALUES_FILE \
            --method PUT \
            --field message="ci: update shop-frontend to $IMAGE_TAG [skip ci]" \
            --field content="$ENCODED" \
            --field sha="$FILE_SHA"

          echo "Successfully updated $VALUES_FILE in $HELM_REPO"
