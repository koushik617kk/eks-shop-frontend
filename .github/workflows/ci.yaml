name: CI - Build and Push to ECR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # Required for OIDC to assume AWS IAM role
  contents: read    # Required to read source repo

env:
  AWS_REGION: us-east-1
  ECR_REPO: shop-frontend

jobs:
  build-and-push:
    name: Build Docker Image and Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO:latest
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          echo "ecr_registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Use actions/checkout to properly clone and push to the Helm repo ──
      # This is the official cross-repo pattern - handles auth automatically
      - name: Checkout Helm repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GH_USERNAME }}/eks-shop-helm
          token: ${{ secrets.HELM_REPO_PAT }}
          path: helm-repo

      - name: Update values.yaml and push
        env:
          ECR_REGISTRY: ${{ steps.build.outputs.ecr_registry }}
          IMAGE_TAG: ${{ steps.build.outputs.image_tag }}
        run: |
          cd helm-repo
          git config user.email "ci@github-actions.com"
          git config user.name "GitHub Actions CI"

          sed -i "s|repository: .*|repository: \"$ECR_REGISTRY/shop-frontend\"|" shop-frontend/values.yaml
          sed -i "s|tag: .*|tag: \"$IMAGE_TAG\"|" shop-frontend/values.yaml

          git add shop-frontend/values.yaml
          git diff --staged --quiet || git commit -m "ci: update shop-frontend to $IMAGE_TAG [skip ci]"
          git push
