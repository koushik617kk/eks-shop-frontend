name: CI — Build & Push to ECR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CRITICAL: GitHub blocks OIDC token generation unless id-token: write is declared
permissions:
  id-token: write   # Allows GitHub Actions to request an OIDC JWT token
  contents: read    # Allows reading the repo code

env:
  AWS_REGION: us-east-1
  ECR_REPO: shop-frontend

jobs:
  build-and-push:
    name: Build Docker Image & Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── Authenticate to AWS using GitHub OIDC (no long-lived keys!) ──────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      # ── Login to ECR ─────────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build, Tag, and Push Docker Image ────────────────────────────────────
      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building image: $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"
          docker build -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO:latest
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          echo "image=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Update Helm repo with new image tag (triggers ArgoCD sync) ──────────
      - name: Update image tag and repository in Helm repo
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          HELM_REPO: eks-shop-helm
          GH_PAT: ${{ secrets.HELM_REPO_PAT }}
          GH_USER: ${{ secrets.GH_USERNAME }}
        run: |
          git config --global user.email "ci@github-actions.com"
          git config --global user.name "GitHub Actions CI"

          # GitHub Actions auto-installs a credential helper using GITHUB_TOKEN which
          # intercepts ALL GitHub git operations — this overrides and clears it so our
          # PAT token in the URL takes effect instead.
          git config --global credential.helper ""
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"

          git clone https://github.com/$GH_USER/$HELM_REPO.git helm-repo
          cd helm-repo

          sed -i "s|repository: .*|repository: \"$ECR_REGISTRY/shop-frontend\"|" shop-frontend/values.yaml
          sed -i "s|tag: .*|tag: \"$IMAGE_TAG\"|" shop-frontend/values.yaml

          git add .
          git commit -m "ci: update shop-frontend -> $IMAGE_TAG [skip ci]"
          git push
